<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head(${editando} ? 'Editar Cliente' : 'Nuevo Cliente')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <!-- Topbar -->
    <div class="topbar">
        <div>
            <div class="topbar-title"
                 th:text="${editando} ? '✏️ Editar Cliente' : '➕ Nuevo Cliente'">
            </div>
            <div class="topbar-sub"
                 th:text="${editando} ? ('Modificando: ' + cliente.nombre) : 'Completá los datos del cliente'">
            </div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/clientes}" class="btn btn-secondary">← Volver a clientes</a>
        </div>
    </div>

    <div class="page-body">

        <!-- Error general -->
        <div th:if="${mensajeError}" class="alert alert-danger">
            ❌ <span th:text="${mensajeError}"></span>
        </div>

        <!-- Formulario -->
        <div style="background:var(--gris-oscuro);border:1px solid var(--gris-borde);border-radius:12px;overflow:hidden;max-width:860px">

            <!-- Header del form -->
            <div style="padding:16px 24px;background:rgba(39,194,201,0.08);border-bottom:1px solid var(--gris-borde)">
                <div style="font-size:15px;font-weight:700"
                     th:text="${editando} ? '✏️ Editando cliente' : '➕ Registrar nuevo cliente'">
                </div>
            </div>

            <form th:action="@{/clientes/guardar}"
                  th:object="${cliente}"
                  method="post"
                  style="padding:24px">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{idCliente}"/>

                <!-- ── SECCIÓN: Datos personales ─────────────────── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">
                    👤 Datos Personales
                </div>

                <!-- Nombre -->
                <div class="form-group">
                    <label class="form-label">Nombre completo *</label>
                    <input type="text"
                           th:field="*{nombre}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid' : ''"
                           placeholder="Nombre y apellidos completos"
                           required>
                    <div th:if="${#fields.hasErrors('nombre')}"
                         class="text-sm"
                         style="color:var(--rojo);margin-top:4px"
                         th:errors="*{nombre}">
                    </div>
                </div>

                <div class="form-row form-row-3">
                    <!-- DPI -->
                    <div class="form-group">
                        <label class="form-label">DPI (CUI)</label>
                        <input type="text"
                               th:field="*{dpi}"
                               class="form-control"
                               placeholder="2901234567890"
                               maxlength="13">
                    </div>

                    <!-- NIT -->
                    <div class="form-group">
                        <label class="form-label">NIT</label>
                        <input type="text"
                               th:field="*{nit}"
                               class="form-control"
                               placeholder="CF o número NIT">
                    </div>

                    <!-- Fecha nacimiento -->
                    <div class="form-group">
                        <label class="form-label">Fecha de nacimiento</label>
                        <input type="date"
                               th:field="*{fechaNacimiento}"
                               class="form-control">
                    </div>
                </div>

                <div class="form-row form-row-2">
                    <!-- Sexo -->
                    <div class="form-group">
                        <label class="form-label">Sexo</label>
                        <select th:field="*{sexo}" class="form-select">
                            <option value="">No especificado</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <!-- Ocupación -->
                    <div class="form-group">
                        <label class="form-label">Ocupación</label>
                        <input type="text"
                               th:field="*{ocupacion}"
                               class="form-control"
                               placeholder="Ej: Estudiante, Maestro, Ingeniero...">
                    </div>
                </div>

                <!-- ── SECCIÓN: Contacto ──────────────────────────── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                    📞 Contacto
                </div>

                <div class="form-row form-row-3">
                    <div class="form-group">
                        <label class="form-label">Teléfono principal</label>
                        <input type="text"
                               th:field="*{telefono}"
                               class="form-control"
                               placeholder="5555-0001">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Teléfono alterno / WhatsApp</label>
                        <input type="text"
                               th:field="*{telefono2}"
                               class="form-control"
                               placeholder="5555-0002">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email"
                               th:field="*{correo}"
                               class="form-control"
                               placeholder="correo@ejemplo.com">
                    </div>
                </div>

                <!-- ── SECCIÓN: Dirección ────────────────────────── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                    📍 Dirección
                </div>

                <div class="form-group">
                    <label class="form-label">Dirección completa</label>
                    <input type="text"
                           th:field="*{direccion}"
                           class="form-control"
                           placeholder="Calle, avenida, número de casa o apartamento...">
                </div>

                <div class="form-row form-row-2">
                    <!-- Zona -->
                    <div class="form-group">
                        <label class="form-label">Zona</label>
                        <select th:field="*{zona}" class="form-select">
                            <option value="">Sin zona</option>
                            <option th:each="z : ${#numbers.sequence(1,25)}"
                                    th:value="${z}"
                                    th:text="'Zona ' + ${z}">
                            </option>
                        </select>
                    </div>

                    <!-- Municipio -->
                    <div class="form-group">
                        <label class="form-label">Municipio</label>
                        <select th:field="*{municipio}" class="form-select">
                            <option th:each="m : ${ {'Guatemala','Mixco','Villa Nueva','San Miguel Petapa','Chinautla','Amatitlán','Santa Catarina Pinula','Fraijanes','Villa Canales','San José Pinula','Otro'} }"
                                    th:value="${m}"
                                    th:text="${m}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- ── SECCIÓN: Notas ────────────────────────────── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                    📝 Notas
                </div>

                <div class="form-group">
                    <label class="form-label">Observaciones del cliente</label>
                    <textarea th:field="*{notas}"
                              class="form-control"
                              rows="2"
                              placeholder="Alergias, preferencias, observaciones especiales...">
                    </textarea>
                </div>

                <!-- Botones -->
                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--gris-borde)">
                    <a th:href="@{/clientes}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="min-width:160px">
                        💾 <span th:text="${editando} ? 'Actualizar Cliente' : 'Registrar Cliente'"></span>
                    </button>
                </div>

            </form>
        </div>

    </div><!-- page-body -->
</div><!-- main-content -->

</body>
</html>
