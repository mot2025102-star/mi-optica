<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Factura ' + ${venta.numeroFactura}">Factura</title>
    <style>
        *  { margin:0;padding:0;box-sizing:border-box }
        body { font-family:Arial,sans-serif;background:#f5f5f5;color:#111;font-size:13px }
        .page { max-width:720px;margin:20px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1) }
        .header { background:#0a0a0a;color:#fff;padding:24px 32px;display:flex;justify-content:space-between;align-items:center }
        .logo-box { width:52px;height:52px;background:#27C2C9;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px }
        .factura-num .num { font-size:20px;font-weight:700;color:#27C2C9 }
        .body { padding:28px 32px }
        .sec-title { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#27C2C9;border-bottom:2px solid #27C2C9;padding-bottom:5px;margin-bottom:10px }
        .info-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px }
        .info-item label { display:block;font-size:10px;color:#888;text-transform:uppercase;margin-bottom:2px }
        .info-item span  { font-weight:600 }
        table  { width:100%;border-collapse:collapse;font-size:12px }
        th     { padding:8px 10px;background:#f8f8f8;border-bottom:2px solid #27C2C9;font-size:11px;font-weight:700;text-transform:uppercase;color:#555 }
        td     { padding:8px 10px;border-bottom:1px solid #f0f0f0 }
        .r     { text-align:right }
        .tot   { display:flex;justify-content:space-between;gap:40px;font-size:13px;padding:4px 0 }
        .tot.main { font-size:17px;font-weight:700;color:#27C2C9;border-top:2px solid #27C2C9;padding-top:10px;margin-top:6px }
        .badge { display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700 }
        .pagada  { background:#e6f9ee;color:#28a745 }
        .anulada { background:#ffeef0;color:#dc3545 }
        .footer  { background:#f8f8f8;border-top:1px solid #eee;padding:12px 32px;display:flex;justify-content:space-between;font-size:11px;color:#888 }
        .btns    { padding:16px;text-align:center;display:flex;gap:12px;justify-content:center }
        .btn     { padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px }
        .bp      { background:#27C2C9;color:#000 }
        .bs      { background:#f0f0f0;color:#333 }
        @media print { body { background:#fff } .page { box-shadow:none;max-width:100%;margin:0;border-radius:0 } .btns { display:none } }
    </style>
</head>
<body>
<div class="page">

    <!-- Header -->
    <div class="header">
        <div style="display:flex;align-items:center;gap:14px">
            <div class="logo-box">👁️</div>
            <div>
                <div style="font-size:22px;font-weight:700">Mi Óptica</div>
                <div style="font-size:11px;color:#27C2C9;text-transform:uppercase;letter-spacing:1px">mi mejor visión</div>
            </div>
        </div>
        <div style="text-align:right">
            <div class="factura-num"><div class="num" th:text="${venta.numeroFactura}"></div></div>
            <div style="font-size:12px;color:#999;margin-top:4px"
                 th:text="${#temporals.format(venta.fecha,'dd/MM/yyyy')}">
            </div>
            <div style="margin-top:8px">
                <span th:class="${venta.estado == 'Pagada'} ? 'badge pagada' : 'badge anulada'"
                      th:text="${venta.estado}">
                </span>
            </div>
        </div>
    </div>

    <div class="body">

        <!-- Info emisor y cliente -->
        <div class="info-grid">
            <div>
                <div class="sec-title">Emisor</div>
                <div class="info-item"><label>Sucursal</label><span th:text="${venta.sucursal.nombre}"></span></div>
                <div class="info-item" style="margin-top:6px"><label>Vendedor</label><span th:text="${venta.usuario.nombreCompleto}"></span></div>
            </div>
            <div>
                <div class="sec-title">Cliente</div>
                <div class="info-item">
                    <label>Nombre</label>
                    <span th:text="${venta.cliente != null ? venta.cliente.nombre : 'Consumidor Final'}"></span>
                </div>
                <div class="info-item" style="margin-top:6px">
                    <label>NIT</label>
                    <span th:text="${venta.cliente != null ? (venta.cliente.nit ?: 'CF') : 'CF'}"></span>
                </div>
            </div>
        </div>

        <!-- Detalle -->
        <div class="sec-title" style="margin-bottom:10px">Detalle de Productos</div>
        <table>
            <thead>
                <tr>
                    <th style="width:80px">Código</th>
                    <th>Descripción</th>
                    <th class="r" style="width:60px">Cant.</th>
                    <th class="r" style="width:90px">Precio</th>
                    <th class="r" style="width:80px">Desc.</th>
                    <th class="r" style="width:90px">Subtotal</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="d : ${venta.detalles}">
                    <td style="color:#27C2C9;font-weight:600" th:text="${d.producto.codigo}"></td>
                    <td th:text="${d.producto.detalle}"></td>
                    <td class="r" th:text="${#numbers.formatDecimal(d.cantidad,1,'COMMA',0,'POINT')}"></td>
                    <td class="r" th:text="'Q' + ${#numbers.formatDecimal(d.precioUnitario,1,'COMMA',2,'POINT')}"></td>
                    <td class="r" th:text="${d.descuento.compareTo(java.math.BigDecimal.ZERO) > 0} ? 'Q' + ${#numbers.formatDecimal(d.descuento,1,'COMMA',2,'POINT')} : '—'"></td>
                    <td class="r" style="font-weight:600" th:text="'Q' + ${#numbers.formatDecimal(d.subtotal,1,'COMMA',2,'POINT')}"></td>
                </tr>
            </tbody>
        </table>

        <!-- Totales -->
        <div style="display:flex;flex-direction:column;align-items:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #eee">
            <div class="tot"><span style="color:#888">Subtotal:</span><span>Q<span th:text="${#numbers.formatDecimal(venta.subtotal,1,'COMMA',2,'POINT')}"></span></span></div>
            <div class="tot" th:if="${venta.descuento.compareTo(java.math.BigDecimal.ZERO) > 0}"
                 style="color:#fd7e14">
                <span>Descuento:</span>
                <span>- Q<span th:text="${#numbers.formatDecimal(venta.descuento,1,'COMMA',2,'POINT')}"></span></span>
            </div>
            <div class="tot main">
                <span>TOTAL:</span>
                <span>Q<span th:text="${#numbers.formatDecimal(venta.total,1,'COMMA',2,'POINT')}"></span></span>
            </div>
        </div>

        <!-- Observación -->
        <div th:if="${venta.observacion != null and !venta.observacion.isEmpty()}"
             style="margin-top:14px;padding:10px 14px;background:#f8f8f8;border-radius:6px;font-size:12px;color:#555">
            📝 <span th:text="${venta.observacion}"></span>
        </div>

        <!-- Firmas -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:40px;padding-top:20px">
            <div style="text-align:center"><div style="border-top:1px solid #333;padding-top:8px;font-size:12px;color:#555">Firma del vendedor</div></div>
            <div style="text-align:center"><div style="border-top:1px solid #333;padding-top:8px;font-size:12px;color:#555">Firma del cliente</div></div>
        </div>
    </div>

    <div class="footer">
        <span>👁️ Mi Óptica — mi mejor visión</span>
        <span th:text="'Generado: ' + ${#temporals.format(#temporals.createNow(),'dd/MM/yyyy HH:mm')}"></span>
        <span th:text="${venta.numeroFactura}"></span>
    </div>

    <div class="btns">
        <button class="btn bp" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
        <button class="btn bs" onclick="window.close()">✖ Cerrar</button>
    </div>
</div>
</body>
</html>
