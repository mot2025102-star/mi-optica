<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Óptica — Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0a0a0a; }
        .login-box { width:100%; max-width:400px; padding:20px; }
        .login-card { background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:40px; }
        .login-logo { text-align:center; margin-bottom:32px; }
        .logo-icono { width:64px; height:64px; background:#27C2C9; border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:32px; margin-bottom:12px; }
        .logo-titulo { font-size:24px; font-weight:700; color:#fff; }
        .logo-sub { font-size:12px; color:#27C2C9; text-transform:uppercase; letter-spacing:2px; margin-top:4px; }
        .form-group { margin-bottom:20px; }
        .form-label { display:block; font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
        .form-input { width:100%; padding:12px 16px; background:#0a0a0a; border:1px solid #1e1e1e; border-radius:10px; color:#fff; font-size:14px; transition:border-color .2s; box-sizing:border-box; }
        .form-input:focus { outline:none; border-color:#27C2C9; }
        .btn-login { width:100%; padding:14px; background:#27C2C9; color:#000; font-size:15px; font-weight:700; border:none; border-radius:10px; cursor:pointer; transition:background .2s; margin-top:8px; }
        .btn-login:hover { background:#1fa8ae; }
        .alerta { padding:12px 16px; border-radius:10px; font-size:13px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .alerta-error   { background:rgba(220,53,69,.1); border:1px solid rgba(220,53,69,.3); color:#ff6b7a; }
        .alerta-success { background:rgba(39,194,201,.1); border:1px solid rgba(39,194,201,.3); color:#27C2C9; }
        .login-footer { text-align:center; margin-top:24px; font-size:12px; color:#444; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icono">👁️</div>
            <div class="logo-titulo">Mi Óptica</div>
            <div class="logo-sub">mi mejor visión</div>
        </div>

        <!-- Mensajes -->
        <div th:if="${mensajeError}" class="alerta alerta-error">
            ❌ <span th:text="${mensajeError}"></span>
        </div>
        <div th:if="${mensajeLogout}" class="alerta alerta-success">
            ✅ <span th:text="${mensajeLogout}"></span>
        </div>
        <div th:if="${mensajeExpired}" class="alerta alerta-error">
            ⏱️ <span th:text="${mensajeExpired}"></span>
        </div>

        <!-- Formulario -->
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <input id="username" type="text" name="username" class="form-input"
                       placeholder="Tu nombre de usuario" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div style="position:relative">
                    <input id="password" type="password" name="password" class="form-input"
                           placeholder="••••••••" required>
                    <button type="button"
                            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;cursor:pointer;font-size:16px"
                            onclick="togglePass()">👁</button>
                </div>
            </div>

            <button type="submit" class="btn-login">Iniciar sesión →</button>
        </form>

        <div class="login-footer">
            Sistema de Gestión — Mi Óptica © 2025
        </div>
    </div>
</div>
<script>
function togglePass() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
