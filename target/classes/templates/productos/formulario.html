<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head(${editando} ? 'Editar Producto' : 'Nuevo Producto')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <div class="topbar-title"
                 th:text="${editando} ? '✏️ Editar Producto' : '➕ Nuevo Producto'">
            </div>
            <div class="topbar-sub"
                 th:text="${editando} ? ('Modificando: ' + producto.detalle) : 'Completá los datos del producto'">
            </div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/productos}" class="btn btn-secondary">← Volver al catálogo</a>
        </div>
    </div>

    <div class="page-body">

        <div th:if="${mensajeError}" class="alert alert-danger">
            ❌ <span th:text="${mensajeError}"></span>
        </div>

        <div style="background:var(--gris-oscuro);border:1px solid var(--gris-borde);border-radius:12px;overflow:hidden;max-width:760px">

            <div style="padding:16px 24px;background:rgba(39,194,201,0.08);border-bottom:1px solid var(--gris-borde)">
                <div style="font-size:15px;font-weight:700"
                     th:text="${editando} ? '✏️ Editando producto' : '➕ Registrar nuevo producto'">
                </div>
                <div class="text-gris text-sm" th:if="${!editando}">
                    Al guardar, se crearán registros de inventario con stock 0 en ambas sucursales.
                </div>
            </div>

            <form th:action="@{/productos/guardar}"
                  th:object="${producto}"
                  method="post"
                  style="padding:24px">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{idProducto}"/>

                <!-- ── Identificación ── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">
                    🔖 Identificación
                </div>

                <div class="form-row form-row-2">
                    <div class="form-group">
                        <label class="form-label">Código único *</label>
                        <input type="text" th:field="*{codigo}" class="form-control"
                               th:classappend="${#fields.hasErrors('codigo')} ? ' is-invalid' : ''"
                               placeholder="Ej: ARM-001, LEN-RAY-002" required>
                        <div th:if="${#fields.hasErrors('codigo')}" class="text-sm"
                             style="color:var(--rojo);margin-top:4px" th:errors="*{codigo}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nombre / Descripción corta *</label>
                        <input type="text" th:field="*{detalle}" class="form-control"
                               th:classappend="${#fields.hasErrors('detalle')} ? ' is-invalid' : ''"
                               placeholder="Ej: Armazón Ray-Ban RB3025 Dorado" required>
                        <div th:if="${#fields.hasErrors('detalle')}" class="text-sm"
                             style="color:var(--rojo);margin-top:4px" th:errors="*{detalle}">
                        </div>
                    </div>
                </div>

                <!-- ── Clasificación ── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                    🏷️ Clasificación
                </div>

                <div class="form-row form-row-2">

                    <!-- Categoría + botón rápido -->
                    <div class="form-group">
                        <label class="form-label">Categoría</label>
                        <div style="display:flex;gap:8px">
                            <select th:field="*{categoria}" class="form-select" style="flex:1">
                                <option value="">Sin categoría</option>
                                <option th:each="c : ${categorias}"
                                        th:value="${c.idCategoria}"
                                        th:text="${c.nombre}"
                                        th:selected="${producto.categoria != null and producto.categoria.idCategoria == c.idCategoria}">
                                </option>
                            </select>
                            <button type="button" class="btn btn-secondary btn-sm"
                                    title="Crear nueva categoría"
                                    onclick="abrirNuevaCat()">➕</button>
                        </div>
                    </div>

                    <!-- Marca + botón rápido -->
                    <div class="form-group">
                        <label class="form-label">Marca</label>
                        <div style="display:flex;gap:8px">
                            <select th:field="*{marca}" class="form-select" style="flex:1">
                                <option value="">Sin marca</option>
                                <option th:each="m : ${marcas}"
                                        th:value="${m.idMarca}"
                                        th:text="${m.nombre}"
                                        th:selected="${producto.marca != null and producto.marca.idMarca == m.idMarca}">
                                </option>
                            </select>
                            <button type="button" class="btn btn-secondary btn-sm"
                                    title="Crear nueva marca"
                                    onclick="abrirNuevaMar()">➕</button>
                        </div>
                    </div>
                </div>

                <div class="form-row form-row-2">
                    <div class="form-group">
                        <label class="form-label">Unidad de medida</label>
                        <select th:field="*{unidadMedida}" class="form-select">
                            <option value="Unidad">Unidad</option>
                            <option value="Par">Par</option>
                            <option value="Caja">Caja</option>
                            <option value="Frasco">Frasco</option>
                            <option value="Kit">Kit</option>
                            <option value="Paquete">Paquete</option>
                        </select>
                    </div>
                    <div class="form-group" th:if="${editando}">
                        <label class="form-label">Estado</label>
                        <div style="display:flex;gap:10px;align-items:center;height:40px">
                            <input type="checkbox" th:field="*{activo}" id="chkActivo"
                                   style="width:18px;height:18px;accent-color:var(--turquesa)">
                            <label for="chkActivo" style="cursor:pointer">
                                Producto activo (visible en ventas e inventario)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- ── Descripción ── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                    📝 Descripción adicional
                </div>

                <div class="form-group">
                    <label class="form-label">Descripción detallada (opcional)</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="3"
                              placeholder="Materiales, medidas, colores, especificaciones técnicas...">
                    </textarea>
                </div>

                <!-- ── Stock inicial (solo al crear) ── -->
                <div th:if="${!editando}">
                    <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                        📦 Stock inicial por sucursal
                    </div>
                    <div style="background:rgba(39,194,201,0.05);border:1px solid var(--gris-borde);border-radius:8px;padding:14px;margin-bottom:12px">
                        <div style="font-weight:600;margin-bottom:10px;color:var(--gris-texto)">¿A qué sucursal(es) agregar el producto?</div>
                        <div style="display:flex;gap:20px;flex-wrap:wrap">
                            <div th:each="suc : ${sucursales}"
                                 style="display:flex;align-items:center;gap:8px;cursor:pointer"
                                 th:onclick="'toggleSucursal(' + ${suc.idSucursal} + ')'">
                                <input type="checkbox"
                                       th:id="'chk_' + ${suc.idSucursal}"
                                       th:value="${suc.idSucursal}"
                                       checked
                                       style="width:18px;height:18px;accent-color:var(--turquesa);cursor:pointer">
                                <label th:for="'chk_' + ${suc.idSucursal}"
                                       th:text="'🏪 ' + ${suc.nombre}"
                                       style="cursor:pointer;font-weight:600"></label>
                            </div>
                        </div>
                    </div>
                    <div id="bloquesSucursales" style="display:flex;flex-direction:column;gap:12px">
                        <div th:each="suc : ${sucursales}"
                             th:id="'bloque_' + ${suc.idSucursal}"
                             style="background:rgba(39,194,201,0.05);border:1px solid var(--gris-borde);border-radius:8px;padding:14px">
                            <div style="font-weight:600;margin-bottom:12px;color:var(--turquesa)" th:text="'🏪 ' + ${suc.nombre}"></div>
                            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
                                <div class="form-group" style="margin-bottom:0">
                                    <label class="form-label">Existencia inicial</label>
                                    <input type="number" step="0.01" min="0"
                                           th:name="'existencia_' + ${suc.idSucursal}"
                                           th:id="'exist_' + ${suc.idSucursal}"
                                           class="form-control" value="0" placeholder="0">
                                </div>
                                <div class="form-group" style="margin-bottom:0">
                                    <label class="form-label">Costo (Q)</label>
                                    <input type="number" step="0.01" min="0"
                                           th:name="'costo_' + ${suc.idSucursal}"
                                           class="form-control" value="0" placeholder="0.00">
                                </div>
                                <div class="form-group" style="margin-bottom:0">
                                    <label class="form-label">Precio venta (Q)</label>
                                    <input type="number" step="0.01" min="0"
                                           th:name="'precio_' + ${suc.idSucursal}"
                                           class="form-control" value="0" placeholder="0.00">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--gris-borde)">
                    <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="min-width:170px">
                        💾 <span th:text="${editando} ? 'Actualizar Producto' : 'Registrar Producto'"></span>
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>

<!-- Modal nueva categoría rápida -->
<div class="modal-overlay" id="modalCat">
    <div class="modal" style="max-width:400px">
        <div class="modal-header">
            <div class="modal-title">➕ Nueva Categoría</div>
            <button class="modal-close" onclick="cerrarModal('modalCat')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Nombre *</label>
                <input type="text" id="catNombre" class="form-control"
                       placeholder="Ej: Lentes de contacto">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('modalCat')">Cancelar</button>
            <button class="btn btn-primary" onclick="crearCategoria()">💾 Guardar</button>
        </div>
    </div>
</div>

<!-- Modal nueva marca rápida -->
<div class="modal-overlay" id="modalMar">
    <div class="modal" style="max-width:400px">
        <div class="modal-header">
            <div class="modal-title">➕ Nueva Marca</div>
            <button class="modal-close" onclick="cerrarModal('modalMar')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Nombre *</label>
                <input type="text" id="marNombre" class="form-control"
                       placeholder="Ej: Essilor, Ray-Ban">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('modalMar')">Cancelar</button>
            <button class="btn btn-primary" onclick="crearMarca()">💾 Guardar</button>
        </div>
    </div>
</div>

<script>
const csrfToken  = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

function abrirNuevaCat() { document.getElementById('modalCat').classList.add('show'); document.getElementById('catNombre').focus(); }
function abrirNuevaMar() { document.getElementById('modalMar').classList.add('show'); document.getElementById('marNombre').focus(); }
function cerrarModal(id) { document.getElementById(id).classList.remove('show'); }

function toggleSucursal(id) {
    const chk   = document.getElementById('chk_' + id);
    const bloque = document.getElementById('bloque_' + id);
    if (!bloque) return;
    if (chk.checked) {
        bloque.style.display = '';
        // Restaurar names para que se envíen
        bloque.querySelectorAll('input[type=number]').forEach(i => {
            i.name = i.id.replace('exist_', 'existencia_') || i.name;
        });
    } else {
        bloque.style.display = 'none';
        // Quitar names para que NO se envíen al backend
        bloque.querySelectorAll('input[type=number]').forEach(i => {
            i.removeAttribute('name');
        });
    }
}

async function crearCategoria() {
    const nombre = document.getElementById('catNombre').value.trim();
    if (!nombre) return;
    const r = await fetch('/productos/api/categoria', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', [csrfHeader]: csrfToken },
        body: 'nombre=' + encodeURIComponent(nombre)
    });
    const d = await r.json();
    if (d.ok) {
        // Agregar al select sin recargar página
        const sel = document.querySelector('select[name="categoria"]');
        const opt = new Option(d.nombre, d.id, true, true);
        sel.appendChild(opt);
        cerrarModal('modalCat');
        document.getElementById('catNombre').value = '';
    } else {
        alert('❌ ' + d.error);
    }
}

async function crearMarca() {
    const nombre = document.getElementById('marNombre').value.trim();
    if (!nombre) return;
    const r = await fetch('/productos/api/marca', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', [csrfHeader]: csrfToken },
        body: 'nombre=' + encodeURIComponent(nombre)
    });
    const d = await r.json();
    if (d.ok) {
        const sel = document.querySelector('select[name="marca"]');
        const opt = new Option(d.nombre, d.id, true, true);
        sel.appendChild(opt);
        cerrarModal('modalMar');
        document.getElementById('marNombre').value = '';
    } else {
        alert('❌ ' + d.error);
    }
}
</script>
</body>
</html>
