<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo + ' — Mi Óptica'}">Mi Óptica</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E👁️%3C/text%3E%3C/svg%3E">
    <style>
        .sidebar-item { gap: 7px; }
        .sidebar-item-icon { display: inline-flex !important; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0.7; }
        .sidebar-item:hover .sidebar-item-icon,
        .sidebar-item.active .sidebar-item-icon { opacity: 1; }
        .sidebar-item-icon svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <!--/* Script que pone la clase de página en el <body> en cuanto carga el DOM */-->
    <script th:inline="javascript">
        const _activePage = /*[[${activePage}]]*/ '';
        document.addEventListener('DOMContentLoaded', function() {
            if (_activePage) {
                document.body.classList.add('page-' + _activePage);
            }
        });
    </script>
</head>

<div th:fragment="sidebar" class="sidebar">

    <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <div class="sidebar-logo-text">
            <div class="sidebar-logo-title">Mi Óptica</div>
            <div class="sidebar-logo-sub">mi mejor visión</div>
        </div>
    </div>

    <div class="sidebar-user">
        <div class="sidebar-user-avatar">
            <sec:authentication property="principal.username" var="username"/>
            <span th:text="${#strings.toUpperCase(#strings.substring(username,0,1))}">U</span>
        </div>
        <div class="sidebar-user-info">
            <div class="sidebar-user-name" sec:authentication="name">Usuario</div>
            <div class="sidebar-user-rol" sec:authentication="principal.authorities">Rol</div>
        </div>
    </div>

    <nav class="sidebar-nav">

        <!-- Dashboard -->
        <a th:href="@{/dashboard}" class="sidebar-item" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
            <span class="sidebar-item-text">Dashboard</span>
        </a>

        <!-- Ventas -->
        <a th:href="@{/ventas}" sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR')" class="sidebar-item" th:classappend="${activePage == 'ventas'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M4 2v3.5M4 5.5H20M4 5.5l1.5 14h13l1.5-14"/><path d="M9 10v4M15 10v4"/></svg></span>
            <span class="sidebar-item-text">Ventas</span>
        </a>

        <!-- Cotización -->
        <a th:href="@{/ventas/cotizacion}" sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR')" class="sidebar-item" th:classappend="${activePage == 'cotizacion'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
            <span class="sidebar-item-text">Cotización</span>
        </a>

        <!-- Productos -->
        <a th:href="@{/productos}" class="sidebar-item" th:classappend="${activePage == 'productos'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
            <span class="sidebar-item-text">Productos</span>
        </a>

        <!-- Inventario -->
        <a th:href="@{/inventario}" sec:authorize="hasAnyRole('ADMINISTRADOR','BODEGUERO','CONTADOR','VENDEDOR')" class="sidebar-item" th:classappend="${activePage == 'inventario'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
            <span class="sidebar-item-text">Inventario</span>
        </a>

        <!-- Kardex -->
        <a th:href="@{/kardex}" sec:authorize="hasAnyRole('ADMINISTRADOR','CONTADOR','BODEGUERO','VENDEDOR')" class="sidebar-item" th:classappend="${activePage == 'kardex'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span>
            <span class="sidebar-item-text">Kardex</span>
        </a>

        <!-- Fichas Clínicas -->
        <a th:href="@{/fichas}" sec:authorize="hasAnyRole('ADMINISTRADOR','OPTOMETRISTA','VENDEDOR')" class="sidebar-item" th:classappend="${activePage == 'fichas'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
            <span class="sidebar-item-text">Fichas Clínicas</span>
        </a>

        <!-- Órdenes Lab -->
        <a th:href="@{/ordenes-lab}" sec:authorize="hasAnyRole('ADMINISTRADOR','OPTOMETRISTA','VENDEDOR')" class="sidebar-item" th:classappend="${activePage == 'ordenes-lab'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v11m0 0h10m-10 0a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2m0 0V9m0 5a2 2 0 0 1-2-2V9m0 0H9"/></svg></span>
            <span class="sidebar-item-text">Órdenes Lab</span>
        </a>

        <!-- Clientes -->
        <a th:href="@{/clientes}" sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR','CONTADOR','OPTOMETRISTA')" class="sidebar-item" th:classappend="${activePage == 'clientes'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
            <span class="sidebar-item-text">Clientes</span>
        </a>

        <!-- Reportes -->
        <a th:href="@{/reportes}" sec:authorize="hasAnyRole('ADMINISTRADOR','CONTADOR')" class="sidebar-item" th:classappend="${activePage == 'reportes'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
            <span class="sidebar-item-text">Reportes</span>
        </a>

        <!-- Corte de Caja -->
        <a th:href="@{/corte-caja}" sec:authorize="hasAnyRole('ADMINISTRADOR','CONTADOR')" class="sidebar-item" th:classappend="${activePage == 'corte-caja'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></span>
            <span class="sidebar-item-text">Corte de Caja</span>
        </a>

        <!-- Saldos -->
        <a th:href="@{/saldos}" sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR','CONTADOR')" class="sidebar-item" th:classappend="${activePage == 'saldos'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span>
            <span class="sidebar-item-text">Saldos / Entregas</span>
        </a>

        <!-- Usuarios -->
        <a th:href="@{/usuarios}" sec:authorize="hasRole('ADMINISTRADOR')" class="sidebar-item" th:classappend="${activePage == 'usuarios'} ? ' active' : ''">
            <span class="sidebar-item-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
            <span class="sidebar-item-text">Usuarios</span>
        </a>

    </nav>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    style="width:100%;display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--gris-texto);font-size:12px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .12s ease;font-family:var(--font)"
                    onmouseover="this.style.background='rgba(234,84,85,0.1)';this.style.color='#EA5455'"
                    onmouseout="this.style.background='none';this.style.color='var(--gris-texto)'">
                <span></span>
                <span>Cerrar sesión</span>
            </button>
        </form>
    </div>

</div>

</html>
