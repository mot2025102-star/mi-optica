<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ─── FRAGMENTO: HEAD ─────────────────────────────────────── -->
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' — Mi Óptica'">Mi Óptica</title>
    <meta name="_csrf"        th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>">
</head>

<!-- ─── FRAGMENTO: SIDEBAR ──────────────────────────────────── -->
<div th:fragment="sidebar" class="sidebar">

    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">👁️</div>
        <div class="sidebar-logo-text">
            <div class="sidebar-logo-title">Mi Óptica</div>
            <div class="sidebar-logo-sub">mi mejor visión</div>
        </div>
    </div>

    <div class="sidebar-user">
        <div class="sidebar-user-avatar">
            <sec:authentication property="principal.username" var="username"/>
            <span th:text="${#strings.toUpperCase(#strings.substring(username,0,1))}">U</span>
        </div>
        <div class="sidebar-user-info">
            <div class="sidebar-user-name" sec:authentication="name">Usuario</div>
            <div class="sidebar-user-rol" sec:authentication="principal.authorities">Rol</div>
        </div>
    </div>

    <nav class="sidebar-nav">

        <div class="sidebar-section-label">General</div>

        <a th:href="@{/dashboard}" class="sidebar-item" 
           th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
            <span class="sidebar-item-icon" >🏠</span>
            <span class="sidebar-item-text" >Dashboard</span>
        </a>

        <div class="sidebar-section-label"
             sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR')">Ventas</div>

        <a th:href="@{/ventas}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'ventas'} ? ' active' : ''">
            <span class="sidebar-item-icon">🧾</span>
            <span class="sidebar-item-text">Ventas</span>
        </a>

        

        
        
        <div class="sidebar-section-label"
             sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR','BODEGUERO')">Inventario</div>

        <a th:href="@{/productos}" class="sidebar-item"
           th:classappend="${activePage == 'productos'} ? ' active' : ''">
            <span class="sidebar-item-icon">📦</span>
            <span class="sidebar-item-text">Productos</span>
        </a>

        <a th:href="@{/inventario}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','BODEGUERO','CONTADOR', 'VENDEDOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'inventario'} ? ' active' : ''">
            <span class="sidebar-item-icon">📊</span>
            <span class="sidebar-item-text">Inventario</span>
        </a>

        <a th:href="@{/kardex}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','CONTADOR','BODEGUERO','VENDEDOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'kardex'} ? ' active' : ''">
            <span class="sidebar-item-icon">📈</span>
            <span class="sidebar-item-text">Kardex</span>
        </a>

        

        <div class="sidebar-section-label"
             sec:authorize="hasAnyRole('ADMINISTRADOR','OPTOMETRISTA','VENDEDOR')">Clínico</div>

        <a th:href="@{/fichas}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','OPTOMETRISTA','VENDEDOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'fichas'} ? ' active' : ''">
            <span class="sidebar-item-icon">👁️</span>
            <span class="sidebar-item-text">Fichas Clínicas</span>
        </a>

        <a th:href="@{/clientes}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR','CONTADOR','OPTOMETRISTA')"
           class="sidebar-item"
           th:classappend="${activePage == 'clientes'} ? ' active' : ''">
            <span class="sidebar-item-icon">👥</span>
            <span class="sidebar-item-text">Clientes</span>
        </a>

        <div class="sidebar-section-label"
            sec:authorize="hasAnyRole('ADMINISTRADOR','CONTADOR')">Reportes</div>

        <a th:href="@{/reportes}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','CONTADOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'reportes'} ? ' active' : ''">
            <span class="sidebar-item-icon">📋</span>
            <span class="sidebar-item-text">Reportes</span>
        </a>

        <a th:href="@{/corte-caja}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','CONTADOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'corte-caja'} ? ' active' : ''">
            <span class="sidebar-item-icon">🏧</span>
            <span class="sidebar-item-text">Corte de Caja</span>
        </a>

        <a th:href="@{/saldos}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','VENDEDOR','CONTADOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'saldos'} ? ' active' : ''">
            <span class="sidebar-item-icon">💳</span>
            <span class="sidebar-item-text">Saldos / Entregas</span>
        </a>
        

        <div class="sidebar-section-label"
             sec:authorize="hasRole('ADMINISTRADOR')">Administración</div>

        <a th:href="@{/usuarios}"
           sec:authorize="hasRole('ADMINISTRADOR')"
           class="sidebar-item"
           th:classappend="${activePage == 'usuarios'} ? ' active' : ''">
            <span class="sidebar-item-icon">👤</span>
            <span class="sidebar-item-text">Usuarios</span>
        </a>

    </nav>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    style="width:100%;display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--gris-texto);font-size:12px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .12s ease;font-family:var(--font)"
                    onmouseover="this.style.background='rgba(234,84,85,0.1)';this.style.color='#EA5455'"
                    onmouseout="this.style.background='none';this.style.color='var(--gris-texto)'">
                <span>🚪</span>
                <span>Cerrar sesión</span>
            </button>
        </form>
    </div>

</div>

</html>
