<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard Contador')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <div class="topbar-title">📊 Panel Contable</div>
            <div class="topbar-sub"
                 th:text="'Bienvenido, ' + ${usuario.nombreCompleto}">
            </div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/reportes}" class="btn btn-primary">📋 Ver Reportes</a>
        </div>
    </div>

    <div class="page-body">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon verde">💰</div>
                <div class="stat-info">
                    <div class="stat-value"
                         th:text="${ventasHoy != null} ? 'Q' + ${#numbers.formatDecimal(ventasHoy,1,'COMMA',2,'POINT')} : 'Q0.00'">
                    </div>
                    <div class="stat-label">Ventas hoy (total)</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon turquesa">🧾</div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${countHoy}">0</div>
                    <div class="stat-label">Facturas emitidas hoy</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amarillo">👥</div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${totalClientes}">0</div>
                    <div class="stat-label">Clientes registrados</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon morado">📦</div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${totalProductos}">0</div>
                    <div class="stat-label">Productos en catálogo</div>
                </div>
            </div>
        </div>

        <!-- Accesos rápidos -->
        <div class="card">
            <div class="card-header"><div class="card-title">⚡ Accesos Rápidos</div></div>
            <div class="card-body" style="padding:16px 20px">
                <div class="stats-grid">
                    <a th:href="@{/reportes}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon verde">📋</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Reportes</div></div>
                    </a>
                    <a th:href="@{/corte-caja}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon turquesa">🏧</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Corte de Caja</div></div>
                    </a>
                    <a th:href="@{/saldos}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon amarillo">💳</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Saldos / Entregas</div></div>
                    </a>
                    <a th:href="@{/ventas}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon morado">🧾</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Ver Ventas</div></div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
