<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard Contador')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <div class="topbar-title">Panel Contable</div>
            <div class="topbar-sub" th:text="'Bienvenido, ' + ${usuario.nombreCompleto}"></div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/reportes}" class="btn btn-primary">Ver Reportes</a>
        </div>
    </div>

    <div class="page-body">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon verde">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value"
                         th:text="${ventasHoy != null} ? 'Q' + ${#numbers.formatDecimal(ventasHoy,1,'COMMA',2,'POINT')} : 'Q0.00'">
                    </div>
                    <div class="stat-label">Ventas hoy (total)</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon turquesa">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${countHoy}">0</div>
                    <div class="stat-label">Facturas emitidas hoy</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amarillo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${totalClientes}">0</div>
                    <div class="stat-label">Clientes registrados</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon naranja">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${totalProductos}">0</div>
                    <div class="stat-label">Productos en catálogo</div>
                </div>
            </div>
        </div>

        <!-- Accesos rápidos -->
        <div class="card">
            <div class="card-header"><div class="card-title">Accesos Rápidos</div></div>
            <div class="card-body" style="padding:16px 20px">
                <div class="stats-grid">
                    <a th:href="@{/reportes}" class="stat-card acceso-rapido" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon verde">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="20" x2="18" y2="10"/>
                                <line x1="12" y1="20" x2="12" y2="4"/>
                                <line x1="6"  y1="20" x2="6"  y2="14"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" style="font-size:15px">Reportes</div>
                            <div class="stat-label">Ver reportes</div>
                        </div>
                    </a>
                    <a th:href="@{/corte-caja}" class="stat-card acceso-rapido" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon turquesa">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 6 2 18 2 18 9"/>
                                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                                <rect x="6" y="14" width="12" height="8"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" style="font-size:15px">Corte de Caja</div>
                            <div class="stat-label">Cierre del día</div>
                        </div>
                    </a>
                    <a th:href="@{/saldos}" class="stat-card acceso-rapido" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon amarillo">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                                <line x1="1" y1="10" x2="23" y2="10"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" style="font-size:15px">Saldos / Entregas</div>
                            <div class="stat-label">Cuentas pendientes</div>
                        </div>
                    </a>
                    <a th:href="@{/ventas}" class="stat-card acceso-rapido" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon naranja">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 2v3.5M4 5.5H20M4 5.5l1.5 14h13l1.5-14"/>
                                <path d="M9 10v4M15 10v4"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" style="font-size:15px">Ver Ventas</div>
                            <div class="stat-label">Historial</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.stat-icon { font-size:0; }
.stat-icon::before { display:none !important; }
.stat-icon svg { width:22px; height:22px; transition:transform .2s ease, opacity .2s ease; }
.stat-card:hover .stat-icon svg { transform:scale(1.18); }
.acceso-rapido .stat-icon svg { opacity:.7; }
.acceso-rapido:hover .stat-icon { box-shadow:0 0 0 3px var(--gold-glow); }
.acceso-rapido:hover .stat-icon svg { transform:scale(1.22); opacity:1; }
</style>
</body>
</html>
