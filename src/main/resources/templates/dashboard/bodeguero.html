<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard Bodeguero')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <div class="topbar-title">Panel de Bodega</div>
            <div class="topbar-sub"
                 th:text="'Bienvenido, ' + ${usuario.nombreCompleto} + ' — ' + ${sucursal}">
            </div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/inventario}" class="btn btn-primary">Ver Inventario</a>
        </div>
    </div>

    <div class="page-body">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon turquesa">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${totalProductos}">0</div>
                    <div class="stat-label">Productos en inventario</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon rojo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${sinStock}">0</div>
                    <div class="stat-label">Sin stock</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amarillo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${stockBajo.size()}">0</div>
                    <div class="stat-label">Stock bajo (≤ 2)</div>
                </div>
            </div>
        </div>

        <!-- Accesos rápidos -->
        <div class="card mb-3">
            <div class="card-header"><div class="card-title">Accesos Rápidos</div></div>
            <div class="card-body" style="padding:16px 20px">
                <div class="stats-grid">
                    <a th:href="@{/inventario}" class="stat-card acceso-rapido" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon turquesa">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" style="font-size:15px">Inventario</div>
                            <div class="stat-label">Ver existencias</div>
                        </div>
                    </a>
                    <a th:href="@{/kardex}" class="stat-card acceso-rapido" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon verde">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
                                <polyline points="16 7 22 7 22 13"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" style="font-size:15px">Kardex</div>
                            <div class="stat-label">Movimientos</div>
                        </div>
                    </a>
                    <a th:href="@{/productos}" class="stat-card acceso-rapido" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon amarillo">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                                <line x1="12" y1="22.08" x2="12" y2="12"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" style="font-size:15px">Productos</div>
                            <div class="stat-label">Catálogo</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- Stock bajo -->
        <div class="card" th:if="${!stockBajo.isEmpty()}">
            <div class="card-header">
                <div class="card-title">Productos con Stock Bajo</div>
                <a th:href="@{/inventario}" class="btn btn-secondary btn-sm">Ver inventario →</a>
            </div>
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Sucursal</th>
                            <th style="text-align:center">Existencia</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="inv : ${stockBajo}">
                            <td>
                                <div class="fw-600" th:text="${inv.producto.detalle}"></div>
                                <div class="text-gris text-sm" th:text="${inv.producto.codigo}"></div>
                            </td>
                            <td class="text-sm" th:text="${inv.sucursal.nombre}"></td>
                            <td style="text-align:center">
                                <span th:class="${inv.existencia.compareTo(T(java.math.BigDecimal).ZERO) == 0}
                                    ? 'badge badge-danger' : 'badge badge-warning'"
                                      th:text="${inv.existencia}">
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/traslados(pid=${inv.producto.idProducto})}"
                                   class="btn btn-sm btn-warning">Trasladar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<style>
.stat-icon { font-size:0; }
.stat-icon::before { display:none !important; }
.stat-icon svg { width:22px; height:22px; transition:transform .2s ease, opacity .2s ease; }
.stat-card:hover .stat-icon svg { transform:scale(1.18); }
.acceso-rapido .stat-icon svg { opacity:.7; }
.acceso-rapido:hover .stat-icon { box-shadow:0 0 0 3px var(--gold-glow); }
.acceso-rapido:hover .stat-icon svg { transform:scale(1.22); opacity:1; }
</style>
</body>
</html>
