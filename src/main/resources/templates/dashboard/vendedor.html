<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard Vendedor')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <div class="topbar-title">🧾 Mi Panel de Ventas</div>
            <div class="topbar-sub"
                 th:text="'Bienvenido, ' + ${usuario.nombreCompleto} + ' — ' + ${sucursal}">
            </div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/ventas/nueva}" class="btn btn-primary">➕ Nueva Venta</a>
        </div>
    </div>

    <div class="page-body">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon verde">💰</div>
                <div class="stat-info">
                    <div class="stat-value"
                         th:text="${ventasHoy != null} ? 'Q' + ${#numbers.formatDecimal(ventasHoy,1,'COMMA',2,'POINT')} : 'Q0.00'">
                    </div>
                    <div class="stat-label">Ventas hoy</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon turquesa">🧾</div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${countHoy}">0</div>
                    <div class="stat-label">Facturas hoy</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amarillo">⚠️</div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${stockBajo.size()}">0</div>
                    <div class="stat-label">Productos con stock bajo</div>
                </div>
            </div>
        </div>

        <!-- Accesos rápidos -->
        <div class="card mb-3">
            <div class="card-header"><div class="card-title">⚡ Accesos Rápidos</div></div>
            <div class="card-body" style="padding:16px 20px">
                <div class="stats-grid">
                    <a th:href="@{/ventas/nueva}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon verde">➕</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Nueva Venta</div></div>
                    </a>
                    <a th:href="@{/ventas}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon turquesa">🧾</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Historial Ventas</div></div>
                    </a>
                    <a th:href="@{/ordenes-lab/nueva}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon morado">🔬</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Nueva Orden Lab</div></div>
                    </a>
                    <a th:href="@{/clientes}" class="stat-card" style="text-decoration:none;cursor:pointer">
                        <div class="stat-icon amarillo">👥</div>
                        <div class="stat-info"><div class="stat-value" style="font-size:15px">Clientes</div></div>
                    </a>
                </div>
            </div>
        </div>

        <!-- Stock bajo (alerta) -->
        <div class="card" th:if="${!stockBajo.isEmpty()}">
            <div class="card-header">
                <div class="card-title">⚠️ Alerta de Stock Bajo</div>
            </div>
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr><th>Producto</th><th>Código</th><th style="text-align:center">Existencia</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="inv : ${stockBajo}">
                            <td class="fw-600" th:text="${inv.producto.detalle}"></td>
                            <td class="text-gris text-sm" th:text="${inv.producto.codigo}"></td>
                            <td style="text-align:center">
                                <span th:class="${inv.existencia.compareTo(T(java.math.BigDecimal).ZERO) == 0}
                                    ? 'badge badge-danger' : 'badge badge-warning'"
                                      th:text="${inv.existencia}">
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
