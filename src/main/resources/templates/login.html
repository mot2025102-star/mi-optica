<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Óptica | Iniciar Sesión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            height: 100vh;
            background-color: #000;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ── IMAGEN ──────────────────────────────────────────────── */
        .image-side {
            flex: 1;
            width: 50%;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #000;
            animation: slideInLeft 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .full-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ── FORMULARIO ──────────────────────────────────────────── */
        .form-side {
            flex: 1;
            width: 50%;
            height: 100vh;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideInRight 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            background-color: transparent;
            color: #fff;
            animation: fadeUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header h2 {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* ── INPUTS ──────────────────────────────────────────────── */
        .input-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-field {
            width: 100%;
            padding: 0.8rem 0;
            padding-right: 2rem;
            background: transparent !important;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff !important;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
            caret-color: #27C2C9;
        }

        .input-field:-webkit-autofill,
        .input-field:-webkit-autofill:hover,
        .input-field:-webkit-autofill:focus,
        .input-field:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px #000 inset !important;
            -webkit-text-fill-color: #fff !important;
            caret-color: #27C2C9;
            transition: background-color 9999s ease;
        }

        .input-field:focus {
            border-bottom-color: #27C2C9;
        }

        .input-label {
            position: absolute;
            left: 0;
            top: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            transition: all 0.25s ease;
            pointer-events: none;
        }

        .input-field:focus ~ .input-label,
        .input-field:not(:placeholder-shown) ~ .input-label,
        .input-field:-webkit-autofill ~ .input-label,
        .input-wrapper.has-value .input-label {
            top: -1rem;
            font-size: 0.8rem;
            color: #27C2C9;
        }

        /* ── BOTÓN OJO ───────────────────────────────────────────── */
        .toggle-pass {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.2rem;
            color: rgba(255, 255, 255, 0.35);
            transition: color 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-pass:hover { color: #27C2C9; }

        .toggle-pass svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        /* ── BOTÓN INGRESAR ──────────────────────────────────────── */
        .login-button {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid #27C2C9;
            border-radius: 30px;
            color: #27C2C9;
            font-size: 1rem;
            font-weight: 400;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 2rem 0;
        }

        .login-button:hover {
            background: rgba(39, 194, 201, 0.1);
            box-shadow: 0 0 20px rgba(39, 194, 201, 0.2);
            color: #fff;
        }

        .login-button:active { transform: scale(0.98); }

        /* ── ALERTAS ─────────────────────────────────────────────── */
        .alert {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            animation: alertIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .alert-icon { font-size: 1rem; flex-shrink: 0; }

        .alert-error {
            color: #ff5c6c;
            background: rgba(255, 92, 108, 0.1);
            border: 1px solid rgba(255, 92, 108, 0.3);
            border-left: 3px solid #ff5c6c;
        }

        .alert-success {
            color: #27C2C9;
            background: rgba(39, 194, 201, 0.1);
            border: 1px solid rgba(39, 194, 201, 0.3);
            border-left: 3px solid #27C2C9;
        }

        .alert-warning {
            color: #f0a500;
            background: rgba(240, 165, 0, 0.1);
            border: 1px solid rgba(240, 165, 0, 0.3);
            border-left: 3px solid #f0a500;
        }

        /* ── FOOTER ──────────────────────────────────────────────── */
        .footer-links { text-align: center; }

        .footer-link {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .footer-link:hover { color: #27C2C9; }

        /* ── ANIMACIONES ─────────────────────────────────────────── */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ──────────────────────────────────────────── */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .main-container { flex-direction: column; }
            .image-side, .form-side {
                width: 100%;
                height: 50vh;
                animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            }
            .login-box { padding: 2rem; animation: none; }
        }
    </style>
</head>
<body>

<div class="main-container">

    <!-- IMAGEN -->
    <div class="image-side">
        <img th:src="@{/img/login-bg.png}"
             src="/img/login-bg.png"
             alt="Mi Óptica"
             class="full-image">
    </div>

    <!-- FORMULARIO -->
    <div class="form-side">
        <div class="login-box">

            <div class="login-header">
                <h2>Iniciar sesión</h2>
                <p class="subtitle">Ingresa tus credenciales</p>
            </div>

            <!-- Mensajes Thymeleaf -->
            <div th:if="${mensajeError}" class="alert alert-error">
                <span class="alert-icon">&#9888;</span>
                <span th:text="${mensajeError}"></span>
            </div>

            <div th:if="${mensajeLogout}" class="alert alert-success">
                <span class="alert-icon">&#10003;</span>
                <span th:text="${mensajeLogout}"></span>
            </div>

            <div th:if="${mensajeExpired}" class="alert alert-warning">
                <span class="alert-icon">&#9200;</span>
                <span th:text="${mensajeExpired}"></span>
            </div>

            <form th:action="@{/login}" method="post" autocomplete="on" id="loginForm">

                <!--
                    Con CookieCsrfTokenRepository el token viene de la cookie XSRF-TOKEN.
                    Thymeleaf lo sigue inyectando igual con th:name y th:value.
                    El JS lo refresca desde la cookie antes de cada submit por si acaso.
                -->
                <input type="hidden"
                       id="csrfInput"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <!-- Usuario -->
                <div class="input-wrapper" id="wrapperUser">
                    <input type="text"
                           id="username"
                           name="username"
                           class="input-field"
                           placeholder=" "
                           required
                           autofocus
                           autocomplete="username">
                    <label for="username" class="input-label">Usuario</label>
                </div>

                <!-- Contraseña + ojo -->
                <div class="input-wrapper" id="wrapperPass">
                    <input type="password"
                           id="password"
                           name="password"
                           class="input-field"
                           placeholder=" "
                           required
                           autocomplete="current-password">
                    <label for="password" class="input-label">Contraseña</label>
                    <button type="button"
                            class="toggle-pass"
                            id="togglePass"
                            tabindex="-1"
                            aria-label="Mostrar contraseña">
                        <svg id="iconoOjo" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>

                <button type="submit" class="login-button">Ingresar</button>

            </form>

            <div class="footer-links">
                <a href="#" class="footer-link"
                   onclick="alert('Contacta al administrador del sistema.'); return false;">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    /* ── TOGGLE OJO ─────────────────────────────────────────────── */
    const toggleBtn = document.getElementById('togglePass');
    const passInput = document.getElementById('password');
    const iconoOjo  = document.getElementById('iconoOjo');

    const SVG_ABIERTO = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const SVG_CERRADO = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>' +
                        '<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>' +
                        '<line x1="1" y1="1" x2="23" y2="23"/>';

    toggleBtn.addEventListener('click', function () {
        if (passInput.type === 'password') {
            passInput.type = 'text';
            iconoOjo.innerHTML = SVG_CERRADO;
            toggleBtn.setAttribute('aria-label', 'Ocultar contraseña');
        } else {
            passInput.type = 'password';
            iconoOjo.innerHTML = SVG_ABIERTO;
            toggleBtn.setAttribute('aria-label', 'Mostrar contraseña');
        }
    });

    /* ── FIX AUTOFILL: subir labels cuando el browser rellena ───── */
    function checkAutofill() {
        if (document.getElementById('username').value.length > 0)
            document.getElementById('wrapperUser').classList.add('has-value');
        if (document.getElementById('password').value.length > 0)
            document.getElementById('wrapperPass').classList.add('has-value');
    }

    checkAutofill();
    setTimeout(checkAutofill, 300);
    setTimeout(checkAutofill, 800);

    document.getElementById('username').addEventListener('input', function () {
        document.getElementById('wrapperUser').classList.toggle('has-value', this.value.length > 0);
    });
    document.getElementById('password').addEventListener('input', function () {
        document.getElementById('wrapperPass').classList.toggle('has-value', this.value.length > 0);
    });

    /* ── REFRESCO DE CSRF ───────────────────────────────────────── */
    /*
     * Con XorCsrfTokenRequestAttributeHandler + CookieCsrfTokenRepository,
     * Thymeleaf ya inyecta el token correcto en el input hidden (th:value).
     * NO se debe sobreescribir con la cookie cruda (XSRF-TOKEN), porque
     * esa cookie contiene el valor RAW sin el XOR aplicado, y Spring Security
     * esperará el valor XOR-eado que Thymeleaf pone automáticamente.
     *
     * Por eso este bloque simplemente NO toca el input; el formulario ya
     * tiene el token correcto desde el primer intento.
     */
    document.getElementById('loginForm').addEventListener('submit', function () {
        // Token ya está correcto gracias a Thymeleaf + XorCsrfTokenRequestAttributeHandler.
        // No se modifica.
    });
</script>

</body>
</html>
