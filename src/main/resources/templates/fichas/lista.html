<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Fichas Clínicas')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <div class="topbar-title"> Fichas Clínicas</div>
            <div class="topbar-sub"
                 th:text="${fichas.size()} + ' ficha(s) encontrada(s)'"></div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/fichas/nueva}" class="btn btn-primary"> Nueva Ficha</a>
        </div>
    </div>

    <div class="page-body">

        <div th:if="${mensajeOk}"    class="alert alert-success"> <span th:text="${mensajeOk}"></span></div>
        <div th:if="${mensajeError}" class="alert alert-danger">  <span th:text="${mensajeError}"></span></div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon turquesa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${fichas.size()}">0</div>
                    <div class="stat-label">Total fichas</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amarillo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${entregasPendientes}">0</div>
                    <div class="stat-label">Entregas pendientes</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon rojo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${conSaldo}">0</div>
                    <div class="stat-label">Con saldo pendiente</div>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="card mb-3">
            <div class="card-body" style="padding:14px 20px">
                <form th:action="@{/fichas}" method="get"
                      style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
                    <div style="flex:1;min-width:220px">
                        <label class="form-label">Buscar cliente</label>
                        <input type="text" name="q" class="form-control"
                               placeholder="Nombre del cliente..."
                               th:value="${q}">
                    </div>
                    <div style="display:flex;gap:8px;align-items:flex-end">
                        <button type="submit" class="btn btn-primary"> Buscar</button>
                        <a th:href="@{/fichas}" class="btn btn-secondary">✖</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tabla -->
        <div class="card">
            <div class="card-header">
                <div class="card-title" th:text="' ' + ${fichas.size()} + ' ficha(s)'"></div>
                <input type="text" class="form-control" style="width:200px"
                       placeholder="Filtro rápido..." oninput="filtrar(this.value)">
            </div>

            <div class="table-wrapper">
                <table class="table" id="tblF">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Cliente</th>
                            <th th:if="${esAdmin}">Sucursal</th>
                            <th>Fecha</th>
                            <th>Optometrista</th>
                            <th>Entrega</th>
                            <th>Estado</th>
                            <th style="text-align:right">Total</th>
                            <th style="text-align:right">Saldo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${fichas.isEmpty()}">
                            <td colspan="10" style="text-align:center;padding:50px;color:var(--gris-texto)">
                                <div style="font-size:40px"></div>
                                <div style="margin-top:10px">No se encontraron fichas clínicas.</div>
                                <a th:href="@{/fichas/nueva}" class="btn btn-primary btn-sm" style="margin-top:12px">
                                     Nueva Ficha
                                </a>
                            </td>
                        </tr>

                        <tr th:each="f : ${fichas}">
                            <td class="text-gris text-sm" th:text="${f.idFicha}"></td>

                            <!-- Cliente -->
                            <td>
                                <div class="fw-600" th:text="${f.cliente.nombre}"></div>
                                <div class="text-gris text-sm" th:text="${f.cliente.telefono ?: '—'}"></div>
                            </td>

                            <!-- Sucursal (solo admin) -->
                            <td th:if="${esAdmin}" class="text-sm text-gris"
                                th:text="${f.sucursal.nombre}"></td>

                            <!-- Fecha -->
                            <td class="text-sm" th:text="${#temporals.format(f.fecha,'dd/MM/yyyy')}"></td>

                            <!-- Optometrista -->
                            <td class="text-sm text-gris"
                                th:text="${f.optometrista.nombreCompleto != null ? f.optometrista.nombreCompleto : f.optometrista.username}"></td>

                            <!-- Fecha entrega -->
                            <td class="text-sm">
                                <span th:if="${f.fechaEntrega != null}"
                                      th:style="${f.diasParaEntrega < 0} ? 'color:var(--rojo)' :
                                                 (${f.diasParaEntrega <= 3} ? 'color:var(--amarillo)' : 'color:var(--gris-texto)')"
                                      th:text="${#temporals.format(f.fechaEntrega,'dd/MM/yyyy')}"></span>
                                <span th:unless="${f.fechaEntrega != null}" class="text-gris">—</span>
                            </td>

                            <!-- Estado entrega -->
                            <td>
                                <span th:if="${f.estadoEntrega == 'Entregado'}"
                                      class="badge badge-success"> Entregado</span>
                                <span th:if="${f.estadoEntrega == 'En proceso'}"
                                      class="badge badge-info"> En proceso</span>
                                <span th:if="${f.estadoEntrega == 'Pendiente' or f.estadoEntrega == null}"
                                      class="badge badge-warning"> Pendiente</span>
                            </td>

                            <!-- Total -->
                            <td style="text-align:right" class="text-sm"
                                th:text="'Q' + ${#numbers.formatDecimal(f.total,1,'COMMA',2,'POINT')}"></td>

                            <!-- Saldo -->
                            <td style="text-align:right">
                                <span th:if="${f.saldo != null and f.saldo.compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                                      class="fw-600" style="color:var(--rojo)"
                                      th:text="'Q' + ${#numbers.formatDecimal(f.saldo,1,'COMMA',2,'POINT')}"></span>
                                <span th:unless="${f.saldo != null and f.saldo.compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                                      class="badge badge-success" style="font-size:11px">Pagado</span>
                            </td>

                            <!-- Acciones -->
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/fichas/editar/{id}(id=${f.idFicha})}"
                                       class="icon-btn icon-btn--metal has-tip"
                                       data-tip="Editar Registro"
                                       aria-label="Editar Registro">
                                        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                            <path d="M12 20h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                                        </svg>
                                    </a>
                                    <form th:action="@{/fichas/eliminar/{id}(id=${f.idFicha})}"
                                          method="post" style="display:inline"
                                          onsubmit="return confirm('¿Eliminar esta ficha?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="icon-btn icon-btn--danger has-tip"
                                                data-tip="Eliminar Registro"
                                                aria-label="Eliminar Registro">
                                            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                                <path d="M10 4h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                                <path d="M5 6h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                                <path d="M9 6v-1a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                                                <path d="M7.5 6l.8 14h7.4l.8-14" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                                                <path d="M11 10.5v7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                                <path d="M13 10.5v7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                            </svg>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
function filtrar(q) {
    q = q.toLowerCase();
    document.querySelectorAll('#tblF tbody tr').forEach(tr =>
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none'
    );
}
</script>

</body>
</html>
