<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Clientes')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <div class="topbar">
        <div>
            <div class="topbar-title"> Clientes / Pacientes</div>
            <div class="topbar-sub"
                 th:text="${clientes.size()} + ' resultado(s) encontrados'">
            </div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/clientes/nuevo}" class="btn btn-primary"> Nuevo Cliente</a>
        </div>
    </div>

    <div class="page-body">

        <div th:if="${mensajeOk}"    class="alert alert-success"> <span th:text="${mensajeOk}"></span></div>
        <div th:if="${mensajeError}" class="alert alert-danger">  <span th:text="${mensajeError}"></span></div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon turquesa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${totalActivos}">0</div>
                    <div class="stat-label">Clientes activos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon rojo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${totalInactivos}">0</div>
                    <div class="stat-label">Inactivos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amarillo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
                <div class="stat-info">
                    <div class="stat-value" th:text="${clientes.size()}">0</div>
                    <div class="stat-label">En esta búsqueda</div>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="card mb-3">
            <div class="card-body" style="padding:14px 20px">
                <form th:action="@{/clientes}" method="get"
                      style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
                    <div style="flex:3;min-width:220px">
                        <label class="form-label">Buscar</label>
                        <div style="position:relative">
                            <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gris-texto)"></span>
                            <input type="text" name="q" class="form-control"
                                   style="padding-left:36px"
                                   placeholder="Nombre, DPI, NIT o teléfono..."
                                   th:value="${q}">
                        </div>
                    </div>
                    <div style="min-width:150px">
                        <label class="form-label">Estado</label>
                        <select name="est" class="form-select">
                            <option value="activo"   th:selected="${est=='activo'}"> Activos</option>
                            <option value="inactivo" th:selected="${est=='inactivo'}"> Inactivos</option>
                            <option value="todos"    th:selected="${est=='todos'}">Todos</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:8px;align-items:flex-end">
                        <button type="submit" class="btn btn-primary"> Buscar</button>
                        <a th:href="@{/clientes}" class="btn btn-secondary">✖</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tabla -->
        <div class="card">
            <div class="card-header">
                <div class="card-title" th:text="' ' + ${clientes.size()} + ' cliente(s)'"></div>
                <input type="text" id="fRap" class="form-control"
                       style="width:200px" placeholder="Filtro rápido..."
                       oninput="filtrarTabla(this.value)">
            </div>

            <div class="table-wrapper">
                <table class="table" id="tblClientes">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>DPI / NIT</th>
                            <th>Contacto</th>
                            <th>Municipio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${clientes.isEmpty()}">
                            <td colspan="6" style="text-align:center;padding:50px;color:var(--gris-texto)">
                                <div style="font-size:40px"></div>
                                <div style="margin-top:10px">No se encontraron clientes.</div>
                                <a th:href="@{/clientes/nuevo}" class="btn btn-primary btn-sm" style="margin-top:12px">
                                     Registrar cliente
                                </a>
                            </td>
                        </tr>

                        <tr th:each="c : ${clientes}">
                            <!-- Nombre -->
                            <td>
                                <div style="display:flex;align-items:center;gap:10px">
                                    <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0"
                                         th:style="${c.sexo == 'Femenino'} ? 'background:rgba(245,197,24,0.15)' : 'background:rgba(39,194,201,0.15)'">
                                        <span th:text="${c.sexo == 'Femenino'} ? '' : ''"></span>
                                    </div>
                                    <div>
                                        <div class="fw-600" th:text="${c.nombre}"></div>
                                        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">
                                            <span th:if="${c.edad != null}"
                                                  style="font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,0.07);color:var(--gris-texto)"
                                                  th:text="${c.edad} + ' años'"></span>
                                            <span th:if="${c.ocupacion != null and !c.ocupacion.isEmpty()}"
                                                  style="font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,0.07);color:var(--gris-texto)"
                                                  th:text="${c.ocupacion}"></span>
                                        </div>
                                    </div>
                                </div>
                            </td>

                            <!-- DPI / NIT -->
                            <td>
                                <div class="text-sm" th:text="'DPI: ' + (${c.dpi} ?: '—')"></div>
                                <div class="text-gris text-sm" th:text="'NIT: ' + (${c.nit} ?: 'CF')"></div>
                            </td>

                            <!-- Contacto -->
                            <td>
                                <div class="text-sm" th:text="${c.telefono} ?: '—'"></div>
                                <div th:if="${c.correo != null and !c.correo.isEmpty()}"
                                     class="text-sm" style="color:var(--turquesa)"
                                     th:text="${c.correo}"></div>
                            </td>

                            <!-- Municipio -->
                            <td class="text-sm text-gris" th:text="${c.municipio} ?: '—'"></td>

                            <!-- Estado -->
                            <td>
                                <span th:class="${c.activo} ? 'badge badge-success' : 'badge badge-danger'"
                                      th:text="${c.activo} ? 'Activo' : 'Inactivo'"></span>
                            </td>

                            <!-- Acciones -->
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/clientes/editar/{id}(id=${c.idCliente})}"
                                       class="btn btn-sm btn-secondary" title="Editar"></a>

                                    <form th:action="@{/clientes/toggle/{id}(id=${c.idCliente})}"
                                          method="post" style="display:inline"
                                          onsubmit="return confirm('¿Cambiar estado del cliente?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit"
                                                th:class="${c.activo} ? 'btn btn-sm btn-danger' : 'btn btn-sm btn-success'"
                                                th:text="${c.activo} ? '' : ''">
                                        </button>
                                    </form>

                                    <form th:action="@{/clientes/eliminar/{id}(id=${c.idCliente})}"
                                          method="post" style="display:inline"
                                          onsubmit="return confirm('¿Eliminar este cliente? Esta acción no se puede deshacer.')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-danger" title="Eliminar"></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
function filtrarTabla(q) {
    q = q.toLowerCase();
    document.querySelectorAll('#tblClientes tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
</script>

</body>
</html>
