<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head(${editando} ? 'Editar Usuario' : 'Nuevo Usuario')}"></head>
<style>
/* Indicador fortaleza contraseña */
.fuerza-bar { display:flex;gap:4px;margin-top:8px }
.fuerza-seg { flex:1;height:5px;border-radius:3px;background:var(--gris-borde);transition:background .3s }
.fuerza-label { font-size:11px;margin-top:4px;font-weight:600 }
.fuerza-0 .fuerza-seg                                                 { background:var(--gris-borde) }
.fuerza-1 .fuerza-seg:nth-child(-n+1)                                  { background:#dc3545 }
.fuerza-2 .fuerza-seg:nth-child(-n+2)                                  { background:#fd7e14 }
.fuerza-3 .fuerza-seg:nth-child(-n+3)                                  { background:#F5C518 }
.fuerza-4 .fuerza-seg:nth-child(-n+4)                                  { background:#20c997 }
.fuerza-5 .fuerza-seg:nth-child(-n+5)                                  { background:#27C2C9 }
</style>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <div>
            <div class="topbar-title"
                 th:text="${editando} ? '✏️ Editar Usuario' : '➕ Nuevo Usuario'">
            </div>
            <div class="topbar-sub"
                 th:text="${editando} ? ('Modificando: ' + req.nombreCompleto) : 'Solo administradores pueden crear usuarios'">
            </div>
        </div>
        <div class="topbar-actions">
            <a th:href="@{/usuarios}" class="btn btn-secondary">← Volver</a>
        </div>
    </div>

    <div class="page-body">

        <div th:if="${mensajeError}" class="alert alert-danger">
            ❌ <span th:text="${mensajeError}"></span>
        </div>

        <div style="background:var(--gris-oscuro);border:1px solid var(--gris-borde);border-radius:12px;overflow:hidden;max-width:760px">

            <div style="padding:16px 24px;background:rgba(39,194,201,0.08);border-bottom:1px solid var(--gris-borde)">
                <div style="font-size:15px;font-weight:700"
                     th:text="${editando} ? '✏️ Editando usuario' : '➕ Registrar nuevo usuario'">
                </div>
                <div class="text-gris text-sm" th:if="${editando}">
                    Deja la contraseña en blanco si no deseas cambiarla.
                </div>
            </div>

            <!-- Nuevo: acción /usuarios/crear | Editar: /usuarios/actualizar -->
            <form th:action="${editando} ? @{/usuarios/actualizar} : @{/usuarios/crear}"
                  th:object="${req}"
                  method="post"
                  style="padding:24px">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{idUsuario}"/>

                <!-- ── Datos personales ── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">
                    👤 Datos del Usuario
                </div>

                <div class="form-row form-row-2">
                    <div class="form-group">
                        <label class="form-label">Nombre completo *</label>
                        <input type="text" th:field="*{nombreCompleto}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('nombreCompleto')} ? ' is-invalid' : ''"
                               placeholder="Nombre y apellidos" required>
                        <div th:if="${#fields.hasErrors('nombreCompleto')}"
                             class="text-sm" style="color:var(--rojo);margin-top:4px"
                             th:errors="*{nombreCompleto}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Username *</label>
                        <input type="text" th:field="*{username}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''"
                               placeholder="Ej: jperez (sin espacios)"
                               autocomplete="new-password"
                               oninput="this.value=this.value.toLowerCase().replace(/\s/g,'')"
                               required>
                        <div th:if="${#fields.hasErrors('username')}"
                             class="text-sm" style="color:var(--rojo);margin-top:4px"
                             th:errors="*{username}">
                        </div>
                    </div>
                </div>

                <!-- ── Contraseña ── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                    🔒 Contraseña
                    <span th:if="${editando}" class="text-gris text-sm" style="text-transform:none;font-weight:400;letter-spacing:0">
                        — dejar en blanco para no cambiar
                    </span>
                </div>

                <div class="form-row form-row-2">
                    <div class="form-group">
                        <label class="form-label" th:text="${editando} ? 'Nueva contraseña' : 'Contraseña *'"></label>
                        <div style="position:relative">
                            <input type="password" th:field="*{password}"
                                   id="passInput"
                                   class="form-control"
                                   placeholder="Mínimo 6 caracteres"
                                   autocomplete="new-password"
                                   oninput="medirFuerza(this.value)"
                                   th:required="${!editando}">
                            <button type="button"
                                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gris-texto);cursor:pointer"
                                    onclick="toggleVer('passInput')">👁</button>
                        </div>
                        <!-- Indicador de fortaleza -->
                        <div id="fuerzaWrap" style="display:none">
                            <div class="fuerza-bar" id="fuerzaBar">
                                <div class="fuerza-seg"></div>
                                <div class="fuerza-seg"></div>
                                <div class="fuerza-seg"></div>
                                <div class="fuerza-seg"></div>
                                <div class="fuerza-seg"></div>
                            </div>
                            <div class="fuerza-label" id="fuerzaLabel"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" th:text="${editando} ? 'Confirmar nueva contraseña' : 'Confirmar contraseña *'"></label>
                        <div style="position:relative">
                            <input type="password" th:field="*{passwordConfirm}"
                                   id="passConfirm"
                                   class="form-control"
                                   placeholder="Repetir contraseña"
                                   autocomplete="new-password"
                                   oninput="verificarMatch()"
                                   th:required="${!editando}">
                            <button type="button"
                                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gris-texto);cursor:pointer"
                                    onclick="toggleVer('passConfirm')">👁</button>
                        </div>
                        <div id="matchMsg" class="text-sm" style="margin-top:4px;display:none"></div>
                    </div>
                </div>

                <!-- ── Acceso y sucursal ── -->
                <div style="font-size:12px;font-weight:700;color:var(--turquesa);text-transform:uppercase;letter-spacing:1px;margin:20px 0 14px">
                    🏢 Acceso y Sucursal
                </div>

                <div class="form-row form-row-3">
                    <!-- Rol -->
                    <div class="form-group">
                        <label class="form-label">Rol *</label>
                        <select th:field="*{idRol}" class="form-select"
                                th:classappend="${#fields.hasErrors('idRol')} ? ' is-invalid' : ''"
                                onchange="mostrarDescRol(this.value)" required>
                            <option value="">Seleccionar rol...</option>
                            <option th:each="r : ${roles}"
                                    th:value="${r.idRol}"
                                    th:text="${r.nombre}"
                                    th:selected="${req.idRol == r.idRol}">
                            </option>
                        </select>
                        <!-- Descripción dinámica del rol -->
                        <div id="descRol" class="text-gris text-sm" style="margin-top:4px"></div>
                    </div>

                    <!-- Sucursal -->
                    <div class="form-group">
                        <label class="form-label">Sucursal *</label>
                        <select th:field="*{idSucursal}" class="form-select"
                                th:classappend="${#fields.hasErrors('idSucursal')} ? ' is-invalid' : ''"
                                required>
                            <option value="">Seleccionar sucursal...</option>
                            <option th:each="s : ${sucursales}"
                                    th:value="${s.idSucursal}"
                                    th:text="${s.nombre}"
                                    th:selected="${req.idSucursal == s.idSucursal}">
                            </option>
                        </select>
                    </div>

                    <!-- Puesto -->
                    <div class="form-group">
                        <label class="form-label">Puesto / Cargo</label>
                        <input type="text" th:field="*{puesto}" class="form-control"
                               placeholder="Ej: Jefe de ventas">
                    </div>
                </div>

                <!-- Estado (solo en edición) -->
                <div class="form-group" th:if="${editando}"
                     style="padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--gris-borde);border-radius:8px;display:flex;align-items:center;gap:12px">
                    <input type="checkbox" th:field="*{activo}" id="chkActivo"
                           style="width:18px;height:18px;accent-color:var(--turquesa)">
                    <label for="chkActivo" style="cursor:pointer;margin:0">
                        <span class="fw-600">Usuario activo</span>
                        <span class="text-gris text-sm"> — los usuarios inactivos no pueden iniciar sesión</span>
                    </label>
                </div>

                <!-- Botones -->
                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--gris-borde)">
                    <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="min-width:170px"
                            onclick="return validarForm()">
                        💾 <span th:text="${editando} ? 'Actualizar Usuario' : 'Crear Usuario'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
const editando = /*[[${editando}]]*/ false;

const ROLES_DESC = {
    '1': '🔧 Acceso completo a todo el sistema',
    '2': '🛍️ Ventas, clientes, cotizaciones, kardex',
    '3': '📦 Inventario, traslados, ingresos de mercancía',
    '4': '👁️ Fichas clínicas, historial, proveedores',
    '5': '💰 Reportes, corte de caja, saldos'
};

function mostrarDescRol(id) {
    const el = document.getElementById('descRol');
    el.textContent = ROLES_DESC[id] || '';
}

// Inicializar descripción si ya hay un rol seleccionado
const selRol = document.querySelector('select[name="idRol"]');
if (selRol?.value) mostrarDescRol(selRol.value);

// ─── Fortaleza contraseña ─────────────────────────────────────────
function medirFuerza(p) {
    const wrap = document.getElementById('fuerzaWrap');
    const bar  = document.getElementById('fuerzaBar');
    const lbl  = document.getElementById('fuerzaLabel');
    if (!p) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';

    let score = 0;
    if (p.length >= 6)                 score++;
    if (p.length >= 10)                score++;
    if (/[A-Z]/.test(p))               score++;
    if (/[0-9]/.test(p))               score++;
    if (/[^A-Za-z0-9]/.test(p))        score++;

    bar.className = 'fuerza-bar fuerza-' + score;
    const niveles = ['', 'Muy débil', 'Débil', 'Regular', 'Fuerte', 'Muy fuerte'];
    const colores = ['', '#dc3545', '#fd7e14', '#F5C518', '#20c997', '#27C2C9'];
    lbl.textContent = niveles[score] || '';
    lbl.style.color = colores[score] || '';

    verificarMatch();
}

// ─── Verificar que las contraseñas coincidan ──────────────────────
function verificarMatch() {
    const p1  = document.getElementById('passInput').value;
    const p2  = document.getElementById('passConfirm').value;
    const msg = document.getElementById('matchMsg');
    if (!p2) { msg.style.display = 'none'; return; }
    msg.style.display = 'block';
    if (p1 === p2) {
        msg.textContent = '✅ Las contraseñas coinciden';
        msg.style.color = 'var(--verde)';
    } else {
        msg.textContent = '❌ Las contraseñas no coinciden';
        msg.style.color = 'var(--rojo)';
    }
}

// ─── Ver/ocultar contraseña ───────────────────────────────────────
function toggleVer(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ─── Validación final antes de enviar ────────────────────────────
function validarForm() {
    const p1 = document.getElementById('passInput').value;
    const p2 = document.getElementById('passConfirm').value;

    if (!editando && !p1) {
        alert('La contraseña es obligatoria para nuevos usuarios.');
        return false;
    }
    if (p1 && p1 !== p2) {
        alert('Las contraseñas no coinciden.');
        return false;
    }
    if (p1 && p1.length < 6) {
        alert('La contraseña debe tener al menos 6 caracteres.');
        return false;
    }
    return true;
}
</script>
</body>
</html>
